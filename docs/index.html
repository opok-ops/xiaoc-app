<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#6366f1">
<title>记忆属于小C</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#6366f1;--pl:#818cf8;--bg:#0f0f23;--c:#1a1a2e;--i:#16213e;--t:#e2e8f0;--m:#94a3b8;--b:#334155;--g:#10b981;--d:#ef4444}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.app{display:flex;flex-direction:column;height:100vh}
.hd{background:linear-gradient(135deg,var(--p),var(--pl));padding:16px 20px;text-align:center}
.hd h1{font-size:20px}
.hd div{font-size:12px;opacity:.9;margin-top:4px}
.main{flex:1;overflow-y:auto;padding-bottom:70px}
.pg{display:none;height:100%}
.pg.act{display:block}
.msgs{padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.5}
.msg.u{align-self:flex-end;background:linear-gradient(135deg,var(--p),var(--pl));border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:var(--c);border:1px solid var(--b);border-bottom-left-radius:4px}
.msg span{font-size:11px;color:var(--m);display:block;margin-top:6px}
.inp{background:var(--c);border-top:1px solid var(--b);padding:12px 16px;display:flex;gap:12px;position:fixed;bottom:56px;left:0;right:0}
.inp textarea{flex:1;background:var(--i);border:1px solid var(--b);border-radius:24px;padding:12px 18px;color:var(--t);font-size:15px;resize:none;max-height:100px;outline:none}
.inp button{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pl));border:none;color:#fff;font-size:20px;cursor:pointer}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--c);border-top:1px solid var(--b);display:flex;justify-content:space-around;padding:8px 0}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px;color:var(--m);cursor:pointer}
.nv.act{color:var(--pl)}
.nv span:first-child{font-size:24px;margin-bottom:4px}
.nv span:last-child{font-size:11px}
.empty{text-align:center;padding:60px 20px;color:var(--m)}
.empty div:first-child{font-size:48px;margin-bottom:16px}
.empty div:nth-child(2){font-size:18px;color:var(--t);margin-bottom:8px}
.set{padding:16px}
.sec{background:var(--c);border:1px solid var(--b);border-radius:12px;margin-bottom:16px;overflow:hidden}
.st{padding:14px 16px;font-size:12px;font-weight:600;color:var(--pl);border-bottom:1px solid var(--b);text-transform:uppercase}
.si{padding:14px 16px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center}
.si:last-child{border-bottom:none}
.si label{font-size:14px}
.si input{width:180px;padding:8px 12px;background:var(--i);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:14px;outline:none}
.si textarea{width:180px;padding:8px 12px;background:var(--i);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:14px;outline:none;min-height:60px}
.tg{position:relative;width:48px;height:26px}
.tg input{opacity:0}
.sl{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--i);border-radius:26px;transition:.3s}
.sl:before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.tg input:checked+.sl{background:var(--p)}
.tg input:checked+.sl:before{transform:translateX(22px)}
.sv{width:100%;padding:14px;background:linear-gradient(135deg,var(--p),var(--pl));border:none;border-radius:12px;color:#fff;font-size:16px;cursor:pointer}
.mem{padding:16px}
.srch{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;gap:10px}
.srch input{flex:1;background:none;border:none;color:var(--t);font-size:15px;outline:none}
.cats{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto}
.ct{padding:8px 16px;border-radius:20px;border:1px solid var(--b);background:var(--c);color:var(--t);font-size:13px;cursor:pointer}
.ct.act{background:var(--p);border-color:var(--p)}
.ml{display:flex;flex-direction:column;gap:12px}
.mc{background:var(--c);border:1px solid var(--b);border-radius:12px;padding:16px}
.mc .tg{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;margin-bottom:8px}
.mc .tg.work{background:#3b82f6}
.mc .tg.study{background:#8b5cf6}
.mc .tg.life{background:#10b981}
.mc .tg.idea{background:#f59e0b}
.mc .tg.fact{background:#ec4899}
.mc .cnt{font-size:14px;line-height:1.6;margin-bottom:8px}
.mc .mt{display:flex;justify-content:space-between;font-size:12px;color:var(--m)}
.mc .ac{display:flex;gap:8px;margin-top:12px}
.mc button{padding:6px 12px;border-radius:8px;border:1px solid var(--b);background:var(--i);color:var(--t);font-size:12px;cursor:pointer}
.add{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pl));border:none;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 15px rgba(99,102,241,.4)}
.md{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.md.act{display:flex}
.mb{background:var(--c);border:1px solid var(--b);border-radius:16px;width:100%;max-width:400px}
.mh{padding:16px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between}
.mh h3{font-size:18px}
.mh button{background:none;border:none;color:var(--m);font-size:24px;cursor:pointer}
.mbd{padding:16px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:13px;color:var(--m);margin-bottom:6px}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 14px;background:var(--i);border:1px solid var(--b);border-radius:8px;color:var(--t);font-size:14px;outline:none}
.fg textarea{min-height:80px}
.mf{padding:16px;border-top:1px solid var(--b);display:flex;gap:12px}
.bt{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;cursor:pointer}
.bt.p{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff}
.bt.s{background:var(--i);color:var(--t);border:1px solid var(--b)}
</style>
</head>
<body>
<div class="app">
<div class="hd"><h1 id="ht">和小C聊天</h1><div id="hs">AI 记忆助手</div></div>
<div class="main">
<div class="pg act" id="cp"><div class="msgs" id="ms"></div></div>
<div class="pg" id="mp">
<div class="mem">
<div class="srch"><span>🔍</span><input id="sr" placeholder="搜索..." oninput="fM()"></div>
<div class="cats" id="cs"><button class="ct act" data-c="all">全部</button><button class="ct" data-c="work">工作</button><button class="ct" data-c="study">学习</button><button class="ct" data-c="life">生活</button><button class="ct" data-c="idea">创意</button><button class="ct" data-c="fact">事实</button></div>
<div class="ml" id="ml"></div>
</div>
<button class="add" onclick="sA()">+</button>
</div>
<div class="pg" id="sp">
<div class="set">
<div class="sec"><div class="st">API 配置</div>
<div class="si"><label>API 地址</label><input type="url" id="au" placeholder="https://api.openai.com/v1"></div>
<div class="si"><label>API Key</label><input type="password" id="ak" placeholder="sk-..."></div>
<div class="si"><label>模型</label><input type="text" id="mo" placeholder="gpt-3.5-turbo"></div>
</div>
<div class="sec"><div class="st">小C 人格</div>
<div class="si"><label>称呼</label><input type="text" id="nm" placeholder="小C"></div>
<div class="si" style="flex-direction:column;align-items:stretch"><label style="margin-bottom:8px">性格描述</label><textarea id="pr" placeholder="温柔体贴，善解人意..."></textarea></div>
</div>
<div class="sec"><div class="st">记忆设置</div>
<div class="si"><label>自动提取记忆</label><label class="tg"><input type="checkbox" id="ae" checked><span class="sl"></span></label></div>
<div class="si"><label>搜索记忆回答</label><label class="tg"><input type="checkbox" id="sm" checked><span class="sl"></span></label></div>
</div>
<div class="sec"><div class="st">数据管理</div>
<div class="si"><label>导出数据</label><button onclick="exD()">导出</button></div>
<div class="si"><label>清除所有数据</label><button style="color:var(--d)" onclick="clD()">清除</button></div>
</div>
<button class="sv" onclick="svS()">保存设置</button>
</div>
</div>
</div>
<div class="inp" id="ib">
<textarea id="ti" placeholder="和小C说点什么..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sd()}"></textarea>
<button onclick="sd()">➤</button>
</div>
<div class="nav">
<div class="nv act" data-p="cp"><span>💬</span><span>聊天</span></div>
<div class="nv" data-p="mp"><span>🧠</span><span>记忆</span></div>
<div class="nv" data-p="sp"><span>⚙️</span><span>设置</span></div>
</div>
</div>
<div class="md" id="am"><div class="mb"><div class="mh"><h3 id="mt">添加记忆</h3><button onclick="cA()">×</button></div><div class="mbd"><div class="fg"><label>分类</label><select id="mc"><option value="work">工作</option><option value="study">学习</option><option value="life">生活</option><option value="idea">创意</option><option value="fact">事实</option></select></div><div class="fg"><label>内容</label><textarea id="mc2" placeholder="记录你想记住的内容..."></textarea></div></div><div class="mf"><button class="bt s" onclick="cA()">取消</button><button class="bt p" onclick="svM()">保存</button></div></div></div>
<script>
var S={pg:'cp',ms:[],mm:[],st:{au:'https://api.openai.com/v1',ak:'',mo:'gpt-3.5-turbo',nm:'小C',pr:'温柔体贴，善解人意，有点俏皮',ae:true,sm:true},eid:null};
function init(){var s=localStorage.getItem('xc');if(s)S=JSON.parse(s);rM();rL();lS();document.querySelectorAll('.nv').forEach(function(n){n.onclick=function(){var p=this.dataset.p;S.pg=p;document.querySelectorAll('.nv').forEach(function(x){x.classList.toggle('act',x.dataset.p===p)});document.querySelectorAll('.pg').forEach(function(x){x.classList.remove('act')});document.getElementById(p).classList.add('act');var t={cp:'和小C聊天',mp:'记忆库',sp:'设置'};document.getElementById('ht').textContent=t[p];document.getElementById('ib').style.display=p==='cp'?'flex':'none'}});document.querySelectorAll('.ct').forEach(function(c){c.onclick=function(){document.querySelectorAll('.ct').forEach(function(x){x.classList.remove('act')});this.classList.add('act');fM()}})}
function svS(){localStorage.setItem('xc',JSON.stringify(S))}
function rM(){var c=document.getElementById('ms');if(S.ms.length===0){c.innerHTML='<div class="empty"><div>💭</div><div>开始和小C聊天吧</div><div>我会记住重要的内容</div></div>';return}c.innerHTML=S.ms.map(function(m){return'<div class="msg '+(m.r==='u'?'u':'a')+'">'+m.c.replace(/</g,'&lt;')+'<span>'+fmt(m.t)+'</span></div>'}).join('');c.scrollTop=c.scrollHeight}
function fmt(t){var d=new Date(t);return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')}
async function sd(){var t=document.getElementById('ti').value.trim();if(!t)return;if(!S.st.ak){alert('请先在设置中配置 API Key');return}S.ms.push({r:'u',c:t,t:Date.now()});document.getElementById('ti').value='';rM();document.getElementById('ti').disabled=true;try{var sys='你是'+(S.st.nm||'小C')+'，一个AI记忆助手。\n关于你：'+(S.st.pr||'温柔体贴')+'\n回复风格：自然、亲切、像朋友一样。';var body={model:S.st.mo,messages:[{role:'system',content:sys}],messages:S.ms.slice(-10).map(function(m){return{role:m.r==='u'?'user':'assistant',content:m.c}}),temperature:.8};var r=await fetch(S.st.au+'/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.st.ak},body:JSON.stringify(body)});var d=await r.json();S.ms.push({r:'a',c:d.choices[0].message.content,t:Date.now()});if(S.st.ae)extM(t);svS();rM()}catch(e){alert('发送失败: '+e.message)}document.getElementById('ti').disabled=false}
function extM(t){var k=['喜欢','讨厌','重要','记住','记得','计划','目标','生日'];if(k.some(function(x){return t.includes(x)})){S.mm.push({id:Date.now(),c:guessC(t),cnt:t,src:'chat',t:Date.now()});svS();rL()}}
function guessC(t){if(/工作|项目|会议|客户/.test(t))return'work';if(/学习|考试|课程|书/.test(t))return'study';if(/生活|吃饭|运动|旅行/.test(t))return'life';if(/想法|创意|点子|计划/.test(t))return'idea';return'fact'}
function rL(){var c=document.getElementById('ml');var s=document.getElementById('sr').value.toLowerCase();var ct=document.querySelector('.ct.act').dataset.c;var f=S.mm;if(ct!=='all')f=f.filter(function(m){return m.c===ct});if(s)f=f.filter(function(m){return m.cnt.toLowerCase().includes(s)});if(f.length===0){c.innerHTML='<div class="empty"><div>📝</div><div>还没有记忆</div><div>点击 + 添加</div></div>';return}var lb={work:'工作',study:'学习',life:'生活',idea:'创意',fact:'事实'};c.innerHTML=f.map(function(m){return'<div class="mc"><span class="tg '+m.c+'">'+lb[m.c]+'</span><div class="cnt">'+m.cnt.replace(/</g,'&lt;')+'</div><div class="mt"><span>'+new Date(m.t).toLocaleDateString()+'</span><span>'+(m.src==='chat'?'来自对话':'手动')+'</span></div><div class="ac"><button onclick="eM('+m.id+')">编辑</button><button style="color:var(--d)" onclick="dM('+m.id+')">删除</button></div></div>'}).join('')}
function fM(){rL()}
function sA(){S.eid=null;document.getElementById('mt').textContent='添加记忆';document.getElementById('mc').value='life';document.getElementById('mc2').value='';document.getElementById('am').classList.add('act')}
function cA(){document.getElementById('am').classList.remove('act')}
function svM(){var c=document.getElementById('mc').value;var t=document.getElementById('mc2').value.trim();if(!t){alert('请输入内容');return}if(S.eid){var m=S.mm.find(function(x){return x.id===S.eid});if(m){m.c=c;m.cnt=t}}else{S.mm.push({id:Date.now(),c:c,cnt:t,src:'manual',t:Date.now()})}svS();rL();cA()}
function eM(id){var m=S.mm.find(function(x){return x.id===id});if(!m)return;S.eid=id;document.getElementById('mt').textContent='编辑记忆';document.getElementById('mc').value=m.c;document.getElementById('mc2').value=m.cnt;document.getElementById('am').classList.add('act')}
function dM(id){if(!confirm('确定删除？'))return;S.mm=S.mm.filter(function(m){return m.id!==id});svS();rL()}
function lS(){document.getElementById('au').value=S.st.au||'';document.getElementById('ak').value=S.st.ak||'';document.getElementById('mo').value=S.st.mo||'';document.getElementById('nm').value=S.st.nm||'';document.getElementById('pr').value=S.st.pr||'';document.getElementById('ae').checked=S.st.ae!==false;document.getElementById('sm').checked=S.st.sm!==false}
function svS(){S.st.au=document.getElementById('au').value;S.st.ak=document.getElementById('ak').value;S.st.mo=document.getElementById('mo').value||'gpt-3.5-turbo';S.st.nm=document.getElementById('nm').value||'小C';S.st.pr=document.getElementById('pr').value;S.st.ae=document.getElementById('ae').checked;S.st.sm=document.getElementById('sm').checked;localStorage.setItem('xc',JSON.stringify(S));alert('已保存')}
function exD(){var d=JSON.stringify({st:S.st,mm:S.mm,ms:S.ms},null,2);var b=new Blob([d],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='xiaoc-backup.json';a.click()}
function clD(){if(!confirm('确定清除所有数据？'))return;localStorage.removeItem('xc');S={pg:'cp',ms:[],mm:[],st:{au:'https://api.openai.com/v1',ak:'',mo:'gpt-3.5-turbo',nm:'小C',pr:'温柔体贴',ae:true,sm:true},eid:null};lS();rM();rL()}
init();
</script>
</body>
</html>
